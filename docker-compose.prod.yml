# ============================================
# Docker Compose - PRODUZIONE (full stack)
# ============================================
#
# Avvia TUTTO in Docker: app + infrastruttura.
# Per sviluppo locale usa invece docker-compose.yml (solo infrastruttura).
# Per singoli moduli usa docker-parts/ (vedi: make help-modules).
#
# Uso:
#   1. cp .env.docker.template .env.docker
#   2. Compila le API key in .env.docker
#   3. docker compose -f docker-compose.prod.yml up --build
#   4. curl http://localhost:8000/health
#
# ============================================

services:

  # ==========================================
  # App - API REST del grafo LangGraph
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-app
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      # URL interni Docker (sovrascrivono i default localhost del codice)
      LITELLM_BASE_URL: http://litellm-proxy:4000/v1
      DEFAULT_MODEL: llm
      QDRANT_URL: http://qdrant:6333
      PGVECTOR_URI: postgresql://postgres:postgres@postgres-vector:5432/vectors
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006
      PHOENIX_PROJECT_NAME: agent-setup
      PHOENIX_TRACING_ENABLED: "true"
      # Neo4j (Cognee knowledge graph)
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      # Fuseki (RDF memory)
      FUSEKI_URL: http://fuseki:3030
      FUSEKI_DATASET: ${FUSEKI_DATASET:-knowledge}
    depends_on:
      litellm-proxy:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres-vector:
        condition: service_healthy
      phoenix:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - agent-net
    restart: unless-stopped
    # Limiti risorse (regola in base al tuo hardware)
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ==========================================
  # LiteLLM Proxy - Gateway LLM multi-provider
  # ==========================================
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    ports:
      - "4000:4000"
    volumes:
      - ./proxy_config.yml:/app/config.yaml:ro
    env_file:
      - .env.docker
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    networks:
      - agent-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================
  # Qdrant - Vector Database
  # ==========================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agent-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  # ==========================================
  # PostgreSQL + pgvector
  # ==========================================
  postgres-vector:
    image: pgvector/pgvector:pg16
    container_name: postgres-vector
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vectors}
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./deploy/docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - agent-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================
  # Arize Phoenix - LLM Observability
  # ==========================================
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    ports:
      - "6006:6006"    # UI + OTLP HTTP
      - "4317:4317"    # OTLP gRPC
    environment:
      PHOENIX_SQL_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres-vector:5432/phoenix
      PHOENIX_ENABLE_PROMETHEUS: "false"
    depends_on:
      postgres-vector:
        condition: service_healthy
    networks:
      - agent-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6006/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G

  # ==========================================
  # Neo4j - Graph Database (Cognee Knowledge Graph)
  # ==========================================
  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    networks:
      - agent-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # ==========================================
  # Fuseki - RDF Store (RDF Memory)
  # ==========================================
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: fuseki
    ports:
      - "${FUSEKI_PORT:-3030}:3030"
    environment:
      ADMIN_PASSWORD: ${FUSEKI_ADMIN_PASSWORD:-admin}
      FUSEKI_DATASET_1: ${FUSEKI_DATASET:-knowledge}
    volumes:
      - fuseki_data:/fuseki/databases
    networks:
      - agent-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3030/$$/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

# ==========================================
# Rete condivisa tra tutti i servizi
# ==========================================
networks:
  agent-net:
    name: agent-net
    driver: bridge

# ==========================================
# Volumi persistenti
# ==========================================
volumes:
  qdrant_data:
    name: agent-qdrant-data
  pgvector_data:
    name: agent-pgvector-data
  neo4j_data:
    name: agent-neo4j-data
  fuseki_data:
    name: agent-fuseki-data
