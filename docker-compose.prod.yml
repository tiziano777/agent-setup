# ============================================
# Docker Compose - PRODUZIONE (full stack)
# ============================================
#
# Avvia TUTTO in Docker: app + infrastruttura.
# Per sviluppo locale usa invece docker-compose.yml (solo infrastruttura).
#
# Uso:
#   1. cp .env.docker.template .env.docker
#   2. Compila le API key in .env.docker
#   3. docker compose -f docker-compose.prod.yml up --build
#   4. curl http://localhost:8000/health
#
# ============================================

services:

  # ==========================================
  # App - API REST del grafo LangGraph
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-app
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      # URL interni Docker (sovrascrivono i default localhost del codice)
      LITELLM_BASE_URL: http://litellm-proxy:4000/v1
      DEFAULT_MODEL: llm
      QDRANT_URL: http://qdrant:6333
      PGVECTOR_URI: postgresql://postgres:postgres@postgres-vector:5432/vectors
    depends_on:
      litellm-proxy:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres-vector:
        condition: service_healthy
    networks:
      - agent-network
    restart: unless-stopped
    # Limiti risorse (regola in base al tuo hardware)
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ==========================================
  # LiteLLM Proxy - Gateway LLM multi-provider
  # ==========================================
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    ports:
      - "4000:4000"
    volumes:
      - ./proxy_config.yml:/app/config.yaml:ro
    env_file:
      - .env.docker
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================
  # Qdrant - Vector Database
  # ==========================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

  # ==========================================
  # PostgreSQL + pgvector
  # ==========================================
  postgres-vector:
    image: pgvector/pgvector:pg16
    container_name: postgres-vector
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vectors}
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - agent-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

# ==========================================
# Rete condivisa tra tutti i servizi
# ==========================================
networks:
  agent-network:
    driver: bridge

# ==========================================
# Volumi persistenti
# ==========================================
volumes:
  qdrant_data:
  pgvector_data:
