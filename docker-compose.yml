# ============================================
# Docker Compose - SVILUPPO (ecosistema completo)
# ============================================
#
# Avvia tutta l'infrastruttura locale per lo sviluppo.
# Per i singoli moduli usa docker-parts/ (vedi: make help-modules).
#
# Uso:
#   make build     # avvia tutto
#   make down      # ferma tutto
#
# ============================================

services:

  # ==========================================
  # LiteLLM Proxy - LLM API Key Rotator
  # ==========================================
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    ports:
      - "4000:4000"
    volumes:
      - ./proxy_config.yml:/app/config.yaml:ro
    env_file:
      - .env
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - agent-net

  # ==========================================
  # Qdrant Vector Database
  # ==========================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - agent-net

  # ==========================================
  # PostgreSQL + pgvector
  # ==========================================
  postgres-vector:
    image: pgvector/pgvector:pg16
    container_name: postgres-vector
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vectors
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./deploy/docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agent-net

  # ==========================================
  # Arize Phoenix - LLM Observability
  # ==========================================
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    ports:
      - "6006:6006"    # UI + OTLP HTTP
      - "4317:4317"    # OTLP gRPC
    environment:
      PHOENIX_SQL_DATABASE_URL: postgresql://postgres:postgres@postgres-vector:5432/phoenix
      PHOENIX_ENABLE_PROMETHEUS: "false"
    depends_on:
      postgres-vector:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6006/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - agent-net

  # ==========================================
  # Streamlit App (da definire)
  # ==========================================
  # app:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: streamlit-app
  #   ports:
  #     - "8501:8501"
  #   depends_on:
  #     litellm-proxy:
  #       condition: service_healthy
  #   env_file:
  #     - .env
  #   restart: unless-stopped

  # ==========================================
  # Oxigraph Triple Store (RDF/SPARQL)
  # ==========================================
  oxigraph:
    image: ghcr.io/oxigraph/oxigraph:latest
    container_name: oxigraph
    ports:
      - "7878:7878"   # SPARQL endpoint + UI
    volumes:
      - oxigraph_data:/data
    command: serve --location /data --bind 0.0.0.0:7878
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7878/query?query=ASK%7B%7D || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - agent-net

  # ==========================================
  # Neo4j Graph Database (Cognee)
  # ==========================================
  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - agent-net

# ==========================================
# Rete condivisa tra tutti i servizi
# ==========================================
networks:
  agent-net:
    name: agent-net
    driver: bridge

# ==========================================
# Volumi persistenti
# ==========================================
volumes:
  qdrant_data:
    name: agent-qdrant-data
  pgvector_data:
    name: agent-pgvector-data
  neo4j_data:
    name: agent-neo4j-data
  oxigraph_data:
    name: agent-oxigraph-data
