# Strategia di Routing: Gemini-first con fallback a livelli (order-based)
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 5                # Aumenta i tentativi visto l'alto tasso di 429/401
  retry_after_detection: True    # Legge l'header Retry-After dei provider
  enable_pre_call_checks: True   # Verifica se il provider è in cooldown prima di chiamare
  timeout: 60                        # Timeout per singola richiesta (secondi)
  allowed_fails: 2                  # Fallimenti prima di escludere temporaneamente un provider
  cooldown_time: 120                 # Cooldown dopo i fallimenti (secondi)
  set_verbose: True

# Impostazioni generali del proxy
general_settings:
  master_key: null

litellm_settings:
  drop_params: true                  # Rimuove parametri non supportati dal provider scelto
