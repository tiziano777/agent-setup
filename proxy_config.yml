# ==========================================================
# LiteLLM Proxy - Configurazione Multi-Provider (Gemini-First)
# ==========================================================
#
# Tutti i modelli condividono model_name "llm" per abilitare
# il routing con priorità deterministica tramite il parametro
# "order" (valore più basso = priorità più alta):
#
#   order: 1 → Gemini (quota giornaliera più alta)
#   order: 2 → Provider tier-2 (Groq, Cerebras, Mistral, ecc.)
#   order: 3 → Provider tier-3 (modelli più piccoli)
#
# Il client chiama semplicemente: model="llm"
# Se Gemini fallisce/rate-limit, il proxy scala ai tier successivi.
#
# 9 provider attivi (da free-apikey-list.txt)
# ==========================================================

model_list:

  #- model_name: llm
  #  litellm_params:
  #    model: anthropic/claude-opus-4-6
  #    api_key: "os.environ/ANTHROPIC_API_KEY"
  #  model_info:
  #    id: anthropic/claude-opus-4-6
  #    name: claude-opus-4-6
  #    provider: anthropic

  # --- Groq ---
