    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: "os.environ/GROQ_API_KEY"
      order: 2
    model_info:
      id: groq/llama-3.3-70b-versatile
      name: llama-3.3-70b-versatile
      provider: groq

  # --- Cerebras ---
