# ============================================
# Secret: API key e credenziali sensibili
# ============================================
# ISTRUZIONI:
#   1. Copia questo file e rinominalo (es. secrets-prod.yml)
#   2. Codifica ogni valore in base64:
#        echo -n "la-tua-api-key" | base64
#   3. Sostituisci i placeholder con i valori base64
#   4. kubectl apply -f secrets-prod.yml -n agent-setup
#
# IMPORTANTE: NON committare questo file con valori reali nel repo git!
# In produzione, usa un Secret manager (es. Vault, AWS Secrets Manager)
# oppure crea i secrets via CLI:
#   kubectl create secret generic llm-api-keys \
#     --from-literal=GROQ_API_KEY=xxx \
#     --from-literal=GOOGLE_API_KEY=xxx \
#     -n agent-setup

apiVersion: v1
kind: Secret
metadata:
  name: llm-api-keys
  namespace: agent-setup
  labels:
    app.kubernetes.io/part-of: agent-setup
type: Opaque
data:
  # Sostituisci ogni <BASE64_VALUE> con: echo -n "valore" | base64
  GROQ_API_KEY: <BASE64_VALUE>
  CEREBRAS_API_KEY: <BASE64_VALUE>
  GOOGLE_API_KEY: <BASE64_VALUE>
  NVIDIA_API_KEY: <BASE64_VALUE>
  MISTRAL_API_KEY: <BASE64_VALUE>
  CODESTRAL_API_KEY: <BASE64_VALUE>
  OPENROUTER_API_KEY: <BASE64_VALUE>
  COHERE_API_KEY: <BASE64_VALUE>
  GITHUB_TOKEN: <BASE64_VALUE>
  CLOUDFLARE_API_KEY: <BASE64_VALUE>
  CLOUDFLARE_ACCOUNT_ID: <BASE64_VALUE>
  VERCEL_API_KEY: <BASE64_VALUE>
  OPENCODEZEN_API_KEY: <BASE64_VALUE>

---
# Credenziali PostgreSQL (separate per chiarezza)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: agent-setup
  labels:
    app.kubernetes.io/part-of: agent-setup
type: Opaque
data:
  # echo -n "postgres" | base64 = cG9zdGdyZXM=
  POSTGRES_USER: cG9zdGdyZXM=
  POSTGRES_PASSWORD: cG9zdGdyZXM=
  POSTGRES_DB: dmVjdG9ycw==

---
# Credenziali Neo4j (Cognee knowledge graph)
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-credentials
  namespace: agent-setup
  labels:
    app.kubernetes.io/part-of: agent-setup
type: Opaque
data:
  # echo -n "password" | base64 = cGFzc3dvcmQ=
  NEO4J_PASSWORD: cGFzc3dvcmQ=
